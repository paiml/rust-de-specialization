<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Rust for Data Engineering: 31-Course Specialization">
  <title>Rust for Data Engineering: 31-Course Specialization</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dea584;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f74c00;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="data" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ai" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9f8fef;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c5cff;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Gear icon (Rust) -->
  <g transform="translate(80, 165)" fill="none" stroke="url(#rust)" stroke-width="4" opacity="0.8">
    <circle r="30"/>
    <circle r="14"/>
    <line x1="0" y1="-40" x2="0" y2="-22"/>
    <line x1="0" y1="22" x2="0" y2="40"/>
    <line x1="-40" y1="0" x2="-22" y2="0"/>
    <line x1="22" y1="0" x2="40" y2="0"/>
    <line x1="-28" y1="-28" x2="-16" y2="-16"/>
    <line x1="16" y1="16" x2="28" y2="28"/>
    <line x1="-28" y1="28" x2="-16" y2="16"/>
    <line x1="16" y1="-16" x2="28" y2="-28"/>
  </g>

  <!-- "31" big number badge -->
  <g transform="translate(155, 165)">
    <circle r="32" fill="#161b22" stroke="url(#rust)" stroke-width="2.5"/>
    <text x="0" y="9" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" fill="#dea584" text-anchor="middle">31</text>
  </g>

  <!-- Pipeline arrows connecting chips -->
  <g stroke="url(#data)" stroke-width="2" fill="none" opacity="0.45">
    <path d="M205 145 L240 145"/>
    <path d="M335 145 L370 145"/>
    <path d="M465 145 L500 145"/>
    <path d="M595 145 L630 145"/>
    <path d="M725 145 L760 145"/>
    <path d="M855 145 L890 145"/>
    <path d="M985 145 L1020 145"/>
    <path d="M205 195 L240 195"/>
    <path d="M335 195 L370 195"/>
    <path d="M465 195 L500 195"/>
    <path d="M595 195 L630 195"/>
    <path d="M725 195 L760 195"/>
    <path d="M855 195 L890 195"/>
    <path d="M985 195 L1020 195"/>
  </g>

  <!-- Top row chips: data foundation (SQLite, ETL, sqlx, Polars, DuckDB, MySQL, Postgres, RAG) -->
  <g font-family="monospace" font-size="11" text-anchor="middle">
    <rect x="240" y="128" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="287" y="149" fill="#dea584">SQLite</text>
    <rect x="370" y="128" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="417" y="149" fill="#dea584">ETL</text>
    <rect x="500" y="128" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="547" y="149" fill="#58a6ff">Polars</text>
    <rect x="630" y="128" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="677" y="149" fill="#58a6ff">DuckDB</text>
    <rect x="760" y="128" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="807" y="149" fill="#58a6ff">MySQL</text>
    <rect x="890" y="128" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="937" y="149" fill="#58a6ff">Postgres</text>
    <rect x="1020" y="128" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="1067" y="149" fill="#9f8fef">RAG</text>
  </g>

  <!-- Bottom row chips: systems + AI + frontends (GUI, TUI, WASM, Serverless, IaC, Contracts, Claude) -->
  <g font-family="monospace" font-size="11" text-anchor="middle">
    <rect x="240" y="178" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="287" y="199" fill="#dea584">GUI</text>
    <rect x="370" y="178" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="417" y="199" fill="#dea584">TUI</text>
    <rect x="500" y="178" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="547" y="199" fill="#dea584">WASM</text>
    <rect x="630" y="178" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="677" y="199" fill="#58a6ff">Serverless</text>
    <rect x="760" y="178" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="807" y="199" fill="#58a6ff">IaC</text>
    <rect x="890" y="178" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="937" y="199" fill="#9f8fef">Contracts</text>
    <rect x="1020" y="178" width="95" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="1067" y="199" fill="#9f8fef">Claude</text>
  </g>

  <!-- Title -->
  <text x="600" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#e6edf3" text-anchor="middle">Rust for Data Engineering</text>
  <text x="600" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">31-Course Specialization · Fast, Reliable &amp; Correct Data Pipelines</text>

  <!-- Bottom tag -->
  <text x="600" y="270" font-family="monospace" font-size="12" fill="#484f58" text-anchor="middle">paiml/rust-de-specialization</text>
</svg>
